<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | Sync Card</title>

  <link rel="stylesheet" href="../../public/assets/css/bootstrap.min.css" />
  <link rel="stylesheet" href="../../public/assets/css/auth.css" />
</head>
<body>

<section class="register-page">

  <div class="register-left">
    <div class="brand">
      <img src="../../public/assets/images/logo.png" alt="Sync Card Logo">
      <h3>Sync <span>Card</span></h3>
    </div>

    <h1>Create Your Account</h1>
    <p>
      Join Sync Card and start building your professional digital identity with
      VCards, QR codes, NFC cards, and smart contact sharing.
    </p>

    <div class="register-preview">
      <div class="preview-card">
        <h4>Digital VCard</h4>
        <p>Tap • Share • Connect</p>
      </div>
    </div>
  </div>

  <div class="register-right">
    <div class="register-form-card">

      <h2><span>Register</span> Now</h2>
      <p>Create your account to get started</p>

      <form id="registerForm">

        <div class="row">
          <div class="col-md-6">
            <label>First Name</label>
            <div class="input-box">
              <span>👤</span>
              <input type="text" placeholder="First name" required>
            </div>
          </div>

          <div class="col-md-6">
            <label>Last Name</label>
            <div class="input-box">
              <span>👤</span>
              <input type="text" placeholder="Last name" required>
            </div>
          </div>
        </div>

        <label>Email Address</label>
        <div class="input-box">
          <span>✉</span>
          <input type="email" placeholder="example@mail.com" required>
        </div>

        <label>Phone Number</label>
        <div class="input-box">
          <span>☎</span>
          <input type="text" placeholder="+94 77 123 4567">
        </div>

        <label>Password</label>
        <div class="input-box">
          <span>🔒</span>
          <input type="password" id="registerPassword" placeholder="Create password" required>
          <button type="button" id="toggleRegisterPassword">👁</button>
        </div>

        <label>Confirm Password</label>
        <div class="input-box">
          <span>🔒</span>
          <input type="password" id="confirmPassword" placeholder="Confirm password" required>
        </div>

        <label class="terms">
          <input type="checkbox" required>
          I agree to the Terms & Conditions and Privacy Policy
        </label>

        <button type="submit" class="signin-btn">
          Create Account →
        </button>

        <p class="register-text">
          Already have an account?
          <a href="login.html">Sign In</a>
        </p>

      </form>

    </div>
  </div>

</section>

<script src="../../public/assets/js/bootstrap.bundle.min.js"></script>
<script src="../../public/assets/js/auth.js"></script>
</body>
</html>
